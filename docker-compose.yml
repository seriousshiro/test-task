version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # image: ${BACKEND_IMAGE}
    container_name: backend
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE}
    container_name: nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
   